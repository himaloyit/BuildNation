# =============================================================================
# Profile: eureka — UAT / Docker  (Netflix Eureka service discovery)
# Activate: SPRING_PROFILES_ACTIVE=eureka
# =============================================================================

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-service-discovery:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Kubernetes discovery — disabled in this profile
spring:
  cloud:
    kubernetes:
      enabled: false
      discovery:
        enabled: false
      config:
        enabled: false
      secrets:
        enabled: false
