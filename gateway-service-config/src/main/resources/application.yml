spring:
  application:
    name: gateway-service-config
  # Service Discovery — override via SPRING_PROFILES_ACTIVE env var
  # eureka → UAT/Docker (Netflix Eureka)  |  k8s → Production (Kubernetes-native)
  profiles:
    active: eureka
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
      # Routes defined programmatically in GatewayConfig.java

server:
  port: 8081

resilience4j:
  circuitbreaker:
    instances:
      member-management:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        sliding-window-type: COUNT_BASED
      security-access-control:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        sliding-window-type: COUNT_BASED
  timelimiter:
    instances:
      member-management:
        timeout-duration: 5s
      security-access-control:
        timeout-duration: 5s
  retry:
    instances:
      member-management:
        max-attempts: 3
        wait-duration: 1s

logging:
  file:
    name: logs/gateway-service-config/app.log

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway, metrics, prometheus
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  # Distributed Tracing (Zipkin) — override ZIPKIN_URL for Docker: http://zipkin:9411
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans

services:
  url:
    member-management: lb://member-management
    security-access-control: lb://security-access-control
