apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      timeout: 60
      # Derived fields enable clicking a traceId in logs to jump to Zipkin.
      # Requires Zipkin to be reachable from this Grafana instance.
      derivedFields:
        - name: TraceID
          matcherRegex: '\[([0-9a-f]{32})\]'
          url: 'http://localhost:9411/zipkin/traces/${__value.raw}'
          urlDisplayLabel: View trace in Zipkin
