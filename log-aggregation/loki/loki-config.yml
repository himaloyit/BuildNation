# =============================================================================
# Loki Configuration — BuildNation
# Storage: local filesystem  |  Retention: 30 days (configurable)
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Schema — use tsdb (recommended for Loki 3.x)
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ── Retention Policy ────────────────────────────────────────────────────────
# global_retention applies to all streams unless overridden per tenant.
# The compactor enforces retention by deleting chunks older than the period.
limits_config:
  # Global retention: keep logs for 30 days
  retention_period: 720h      # 720h = 30 days

  # Per-stream overrides (uncomment and adjust as needed):
  # stream_retention_period:
  #   - selector: '{job="member-management"}'
  #     priority: 10
  #     period: 168h            # 7 days for member-management

  # Ingestion limits
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  max_streams_per_user: 10000
  max_line_size: 256kb

# ── Compactor (enforces retention) ──────────────────────────────────────────
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h       # Wait 2h before physical deletion
  retention_delete_worker_count: 150
  compaction_interval: 10m         # Run compaction every 10 minutes
  delete_request_store: filesystem

# ── Query Performance ────────────────────────────────────────────────────────
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# ── Ruler (alerting — optional) ─────────────────────────────────────────────
ruler:
  alertmanager_url: http://localhost:9093

# ── Analytics (disable phone-home) ──────────────────────────────────────────
analytics:
  reporting_enabled: false
