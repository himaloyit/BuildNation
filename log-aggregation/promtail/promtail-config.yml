      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) \[(?P<thread>[^\]]*)\] \[(?P<trace_id>[^\]]*)\] \[(?P<span_id>[^\]]*)\] \[(?P<request_id>[^\]]*)\] (?P<level>[A-Z]+)\s+(?P<logger>\S+) - (?P<message>.*)'
      - labels:
          level:
          trace_id:
          span_id:
      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05.000'

  # ── eureka-service-discovery ──────────────────────────────────────────────
  - job_name: eureka-service-discovery
    static_configs:
      - targets: [localhost]
        labels:
          job: eureka-service-discovery
          service: eureka-service-discovery
          environment: local
          __path__: /var/log/buildnation/eureka-service-discovery/logs/**/*.log
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}'
