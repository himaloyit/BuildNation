          environment: local
          __path__: /var/log/buildnation/gateway-service-config/logs/**/*.log
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}'
