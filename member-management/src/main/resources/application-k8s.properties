# =============================================================================
# Profile: k8s — Production  (Kubernetes-native service discovery)
# Activate: SPRING_PROFILES_ACTIVE=k8s
# Services are discovered via the Kubernetes API — no Eureka server is needed.
# The K8s Service name must match spring.application.name (member-management).
# =============================================================================

# Eureka — disabled
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Kubernetes discovery — enabled
spring.cloud.kubernetes.enabled=true
spring.cloud.kubernetes.discovery.enabled=true
spring.cloud.kubernetes.config.enabled=false
spring.cloud.kubernetes.secrets.enabled=false

# Discover services across all namespaces (set to false to restrict to pod's namespace)
spring.cloud.kubernetes.discovery.all-namespaces=false
