# =============================================================================
# Profile: eureka — UAT / Docker  (Netflix Eureka service discovery)
# Activate: SPRING_PROFILES_ACTIVE=eureka
# =============================================================================

# Eureka
eureka.client.enabled=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-service-discovery:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Kubernetes discovery — disabled in this profile
spring.cloud.kubernetes.enabled=false
spring.cloud.kubernetes.discovery.enabled=false
spring.cloud.kubernetes.config.enabled=false
spring.cloud.kubernetes.secrets.enabled=false
