spring.application.name=security-access-control
server.port=8082

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/buildnation_db
spring.datasource.username=buildnation
spring.datasource.password=buildnation123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Service Discovery — set via SPRING_PROFILES_ACTIVE env var
# eureka → UAT/Docker (Netflix Eureka)  |  k8s → Production (Kubernetes-native)
spring.profiles.active=eureka

# JWT
jwt.secret=BuildNationSuperSecretKeyForJWT2026ForHS256Algorithm
jwt.access-token-expiration-ms=3600000

# Actuator & Observability
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Distributed Tracing (Zipkin) — override ZIPKIN_URL for Docker: http://zipkin:9411
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

# Disable Kafka for local dev
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Logging
logging.file.name=logs/security-access-control/app.log
